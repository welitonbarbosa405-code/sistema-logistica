{% extends "base.html" %}

{% block content %}
<div class="bg-gradient-to-br from-slate-50 via-slate-100 to-gray-100 min-h-screen py-8 px-4">
  <!-- Header -->
  <div class="max-w-3xl mx-auto mb-8">
    <div class="flex items-center gap-3">
      <a href="{{ url_for('feiras.index') }}" class="inline-flex items-center justify-center w-10 h-10 bg-gray-200 hover:bg-gray-300 rounded-lg transition-colors duration-200">
        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
      </a>
      <div class="flex items-center gap-3">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-500/20 rounded-lg">
          <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
        </div>
        <div>
          <h1 class="text-3xl font-bold text-gray-800">Nova Feira</h1>
          <p class="text-sm text-gray-600">Cadastre uma nova feira ou exposição</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Mensagens Flash -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="max-w-3xl mx-auto mb-4">
          <div class="p-4 rounded-lg flex items-center gap-3 {{ 'bg-green-50 border border-green-200' if category == 'success' else 'bg-red-50 border border-red-200' }}">
            <svg class="w-5 h-5 {{ 'text-green-600' if category == 'success' else 'text-red-600' }}" fill="currentColor" viewBox="0 0 20 20">
              {% if category == 'success' %}
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
              {% else %}
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
              {% endif %}
            </svg>
            <span class="{{ 'text-green-700' if category == 'success' else 'text-red-700' }}">{{ message }}</span>
          </div>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Formulário -->
  <div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <form method="POST" action="{{ url_for('feiras.nova_feira') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Nome da Feira -->
          <div class="md:col-span-2">
            <label for="nome" class="block text-sm font-semibold text-gray-700 mb-2">
              Nome da Feira <span class="text-red-500">*</span>
            </label>
            <input type="text" id="nome" name="nome" required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-200"
              placeholder="Ex: Agrishow 2026">
          </div>

          <!-- Local -->
          <div class="md:col-span-2">
            <label for="local" class="block text-sm font-semibold text-gray-700 mb-2">
              Local <span class="text-red-500">*</span>
            </label>
            <input type="text" id="local" name="local" required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-200"
              placeholder="Ex: Ribeirão Preto - SP">
          </div>

          <!-- Data Início -->
          <div>
            <label for="data_inicio" class="block text-sm font-semibold text-gray-700 mb-2">
              Data de Início <span class="text-red-500">*</span>
            </label>
            <input type="text" id="data_inicio" name="data_inicio" required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-200"
              placeholder="DD/MM/YYYY" maxlength="10">
          </div>

          <!-- Data Fim -->
          <div>
            <label for="data_fim" class="block text-sm font-semibold text-gray-700 mb-2">
              Data de Término <span class="text-red-500">*</span>
            </label>
            <input type="text" id="data_fim" name="data_fim" required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-200"
              placeholder="DD/MM/YYYY" maxlength="10">
          </div>

          <!-- Observações -->
          <div class="md:col-span-2">
            <label for="observacoes" class="block text-sm font-semibold text-gray-700 mb-2">
              Observações
            </label>
            <textarea id="observacoes" name="observacoes" rows="4"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-200"
              placeholder="Observações adicionais sobre a feira..."></textarea>
          </div>
        </div>

        <!-- Botões -->
        <div class="flex justify-end gap-4 mt-8 pt-6 border-t">
          <a href="{{ url_for('feiras.index') }}" 
            class="px-6 py-3 bg-gray-500 hover:bg-gray-600 text-white font-semibold rounded-lg transition-colors duration-200">
            Cancelar
          </a>
          <button type="submit" 
            class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors duration-200 flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            Cadastrar Feira
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
// Máscara para campos de data
document.addEventListener('DOMContentLoaded', function() {
  const dataInputs = document.querySelectorAll('#data_inicio, #data_fim');
  
  dataInputs.forEach(input => {
    input.addEventListener('input', function(e) {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 2) {
        value = value.substring(0, 2) + '/' + value.substring(2);
      }
      if (value.length > 5) {
        value = value.substring(0, 5) + '/' + value.substring(5, 9);
      }
      e.target.value = value;
    });
  });
});
</script>
{% endblock %}
